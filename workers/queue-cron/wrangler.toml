name = "aura-hub-queue-cron"
main = "index.ts"
compatibility_date = "2026-06-01"

# Co 2 minuty przetwarza partię kolejki wysyłki
[triggers]
crons = ["*/2 * * * *"]

[vars]
# Publiczny adres aplikacji Aura HUB (Cloudflare Pages)
HUB_URL = "https://hub.auraexpert.pl"

# UWAGA: sekretu NIE wpisujemy do tego pliku (trafiłby do repo).
# Ustaw go po wdrożeniu workera przez:
#   npx wrangler secret put QUEUE_CRON_SECRET
# (ta sama wartość co zmienna QUEUE_CRON_SECRET w Cloudflare Pages)
